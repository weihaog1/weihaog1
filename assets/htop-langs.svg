<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" role="img" aria-label="Language load: Jupyter 47 percent, Python 32 percent, TypeScript 17 percent, shell and web 4 percent, measured by bytes across public repos">
  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <rect x="0.5" y="0.5" width="719" height="219" rx="8" fill="#0D1117" stroke="#30363D"/>

  <text x="24" y="34" font-size="14" xml:space="preserve"><tspan fill="#3FB950">alan@uci</tspan><tspan fill="#8B949E">:~$ </tspan><tspan fill="#00F7FF">htop --sort-key=BYTES</tspan></text>
  <text x="24" y="62" font-size="12" fill="#8B949E" xml:space="preserve">LANG          LOAD                                                                %</text>

  <g font-size="13">
    <text x="24" y="93" fill="#00F7FF">jupyter</text>
    <rect x="150" y="81" width="440" height="14" rx="2" fill="#161B22"/>
    <rect x="150" y="81" width="0" height="14" rx="2" fill="#00F7FF">
      <animate attributeName="width" from="0" to="208" dur="1.1s" begin="0.15s" fill="freeze"/>
    </rect>
    <text x="612" y="93" fill="#E6EDF3" fill-opacity="0">47.2<animate attributeName="fill-opacity" to="1" dur="0.2s" begin="1.25s" fill="freeze"/></text>

    <text x="24" y="125" fill="#00F7FF">python</text>
    <rect x="150" y="113" width="440" height="14" rx="2" fill="#161B22"/>
    <rect x="150" y="113" width="0" height="14" rx="2" fill="#7B2FFF">
      <animate attributeName="width" from="0" to="140" dur="1.1s" begin="0.3s" fill="freeze"/>
    </rect>
    <text x="612" y="125" fill="#E6EDF3" fill-opacity="0">31.9<animate attributeName="fill-opacity" to="1" dur="0.2s" begin="1.4s" fill="freeze"/></text>

    <text x="24" y="157" fill="#00F7FF">typescript</text>
    <rect x="150" y="145" width="440" height="14" rx="2" fill="#161B22"/>
    <rect x="150" y="145" width="0" height="14" rx="2" fill="#3FB950">
      <animate attributeName="width" from="0" to="77" dur="1.1s" begin="0.45s" fill="freeze"/>
    </rect>
    <text x="612" y="157" fill="#E6EDF3" fill-opacity="0">17.5<animate attributeName="fill-opacity" to="1" dur="0.2s" begin="1.55s" fill="freeze"/></text>

    <text x="24" y="189" fill="#00F7FF">shell+web</text>
    <rect x="150" y="177" width="440" height="14" rx="2" fill="#161B22"/>
    <rect x="150" y="177" width="0" height="14" rx="2" fill="#F778BA">
      <animate attributeName="width" from="0" to="16" dur="1.1s" begin="0.6s" fill="freeze"/>
    </rect>
    <text x="612" y="189" fill="#E6EDF3" fill-opacity="0">3.4<animate attributeName="fill-opacity" to="1" dur="0.2s" begin="1.7s" fill="freeze"/></text>
  </g>

  <text x="24" y="211" font-size="11" fill="#6E7681">load measured by bytes across public repos</text>
</svg>
