<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 150" width="860" height="150" role="img" aria-label="Terminal session ending: exit, logout, connection to uci closed">
  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  </style>
  <defs>
    <clipPath id="typeexit">
      <rect x="24" y="26" width="0" height="24">
        <animate attributeName="width" from="0" to="145" dur="0.9s" begin="0.2s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>
  <rect x="0.5" y="0.5" width="859" height="149" rx="8" fill="#0D1117" stroke="#30363D"/>

  <text x="24" y="43" font-size="14" clip-path="url(#typeexit)" xml:space="preserve"><tspan fill="#3FB950">alan@uci</tspan><tspan fill="#8B949E">:~$ </tspan><tspan fill="#00F7FF">exit</tspan></text>

  <text x="24" y="72" font-size="14" fill="#E6EDF3" fill-opacity="0">logout<animate attributeName="fill-opacity" to="1" dur="0.15s" begin="1.25s" fill="freeze"/></text>
  <text x="24" y="98" font-size="14" fill="#8B949E" fill-opacity="0">Connection to uci closed. Thanks for stopping by.<animate attributeName="fill-opacity" to="1" dur="0.15s" begin="1.5s" fill="freeze"/></text>

  <g fill-opacity="0">
    <text x="24" y="130" font-size="14" xml:space="preserve"><tspan fill="#3FB950">guest@github</tspan><tspan fill="#8B949E">:~$ </tspan></text>
    <animate attributeName="fill-opacity" to="1" dur="0.1s" begin="1.9s" fill="freeze"/>
  </g>
  <rect x="152" y="117" width="8" height="15" fill="#00F7FF" opacity="0">
    <animate attributeName="opacity" values="1;0" keyTimes="0;0.5" calcMode="discrete" dur="1.06s" begin="1.9s" repeatCount="indefinite"/>
  </rect>
</svg>
